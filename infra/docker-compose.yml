services:
  postgres:
    image: postgres:15-alpine
    container_name: emotion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: emotion
      POSTGRES_PASSWORD: emotion
      POSTGRES_DB: emotion_companion
    ports:
      - "5432:5432"
    volumes:
      - emotion_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emotion -d emotion_companion"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: emotion-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - emotion_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  emotion_pg_data:
  emotion_redis_data:
