# Phase 7：生产环境 compose
#
# 说明：
# - 生产环境不包含 PostgreSQL 与 Redis（使用托管云服务），只跑 api 与 nginx
# - api 从环境变量读配置，DATABASE_URL / REDIS_URL / JWT_SECRET / ANTHROPIC_API_KEY 等
#   必须通过 .env.prod 或外部 secret 注入，禁止硬编码
# - nginx 提供 80→443 重定向、静态文件服务、/api/* 反向代理
# - 证书挂载到 /etc/nginx/certs（示例：Let's Encrypt 的 fullchain.pem + privkey.pem）
#
# 启动：
#   docker compose -f infra/docker-compose.prod.yml --env-file .env.prod up -d

services:
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    image: emotion-companion-api:latest
    container_name: emotion-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      LOG_LEVEL: info
      # 以下必须通过 --env-file 注入，禁止硬编码
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_SSL: "true"
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN}
      MAX_REQUESTS_PER_MINUTE: ${MAX_REQUESTS_PER_MINUTE:-60}
      ENABLE_SAFETY_GUARD: "true"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      AI_MODEL: ${AI_MODEL:-claude-sonnet-4-20250514}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-1024}
      INTAKE_TIMEOUT_MS: ${INTAKE_TIMEOUT_MS:-10000}
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:3000/api/health >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    # 优雅关停：给 Node 进程 35 秒，略长于 app 内置的 30s 超时
    stop_grace_period: 35s
    networks:
      - emotion-net

  nginx:
    image: nginx:1.27-alpine
    container_name: emotion-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      # 前端构建产物（由 CI 提前构建到 apps/web/dist 后挂载）
      - ../apps/web/dist:/usr/share/nginx/html:ro
    networks:
      - emotion-net

networks:
  emotion-net:
    driver: bridge
